<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 660" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>B045 — Dos escenarios según solapamiento de páginas</title>
  <desc>Diagrama mostrando dos escenarios distintos según si los casos consecutivos comparten o no la misma página física.</desc>
  <style>
    .t-th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .t-ts { font-size: 12px; font-weight: 400; fill: #444441; }
    .t-c-gray-th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .t-c-gray-ts { font-size: 12px; font-weight: 400; fill: #444441; }
    .t-c-teal-th { font-size: 14px; font-weight: 500; fill: #04342C; }
    .t-c-teal-ts { font-size: 12px; font-weight: 400; fill: #085041; }
    .t-c-coral-th { font-size: 14px; font-weight: 500; fill: #4A1B0C; }
    .t-c-coral-ts { font-size: 12px; font-weight: 400; fill: #712B13; }
    .t-amber-th { font-size: 14px; font-weight: 500; fill: #854F0B; }
    .t-amber-ts { font-size: 12px; font-weight: 400; fill: #633806; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="t-th" x="340" y="28" text-anchor="middle">B045 — Dos escenarios según solapamiento de páginas</text>

  <rect x="40" y="55" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t-c-gray-th" x="340" y="75" text-anchor="middle" dominant-baseline="central">Operación común: catalogador registra pagina_fin = pagina_inicio_del_siguiente</text>
  <text class="t-c-gray-ts" x="340" y="95" text-anchor="middle" dominant-baseline="central">Sin transformación, sin distinguir si comparten página. Cruzador resta 1 al header (siempre).</text>

  <text class="t-th" x="180" y="145" text-anchor="middle">Escenario A: páginas distintas</text>
  <text class="t-th" x="500" y="145" text-anchor="middle">Escenario B: misma página</text>

  <rect x="40" y="160" width="280" height="84" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t-c-teal-ts" x="60" y="180" dominant-baseline="central">Caso N: inicio 825, fin 830</text>
  <text class="t-c-teal-ts" x="60" y="198" dominant-baseline="central">Caso N+1: inicio 830, fin 835</text>
  <text class="t-c-teal-ts" x="60" y="218" dominant-baseline="central">Headers en el mapa: 825, 830, 835</text>
  <text class="t-c-teal-ts" x="60" y="236" dominant-baseline="central">Hay un solo header de 830.</text>

  <rect x="360" y="160" width="280" height="84" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="t-c-coral-ts" x="380" y="180" dominant-baseline="central">Caso N: inicio 829, fin 829</text>
  <text class="t-c-coral-ts" x="380" y="198" dominant-baseline="central">Caso N+1: inicio 829, fin 832</text>
  <text class="t-c-coral-ts" x="380" y="218" dominant-baseline="central">Headers en el mapa: 829, 832</text>
  <text class="t-c-coral-ts" x="380" y="236" dominant-baseline="central">Un solo header de 829, compartido.</text>

  <line x1="180" y1="244" x2="180" y2="270" class="arr" marker-end="url(#arrow)"/>
  <line x1="500" y1="244" x2="500" y2="270" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="275" width="280" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t-c-teal-th" x="60" y="295" dominant-baseline="central">Cruzador para caso N:</text>
  <text class="t-c-teal-ts" x="60" y="313" dominant-baseline="central">linea_inicio = header(825)</text>
  <text class="t-c-teal-ts" x="60" y="331" dominant-baseline="central">linea_fin = header(830) − 1</text>
  <text class="t-c-teal-ts" x="60" y="349" dominant-baseline="central">Bloque NO vacío, sin arrastre del</text>
  <text class="t-c-teal-ts" x="60" y="367" dominant-baseline="central">caso siguiente. Status: ok.</text>

  <rect x="360" y="275" width="280" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="t-c-coral-th" x="380" y="295" dominant-baseline="central">Cruzador para caso N:</text>
  <text class="t-c-coral-ts" x="380" y="313" dominant-baseline="central">linea_inicio = header(829) = X</text>
  <text class="t-c-coral-ts" x="380" y="331" dominant-baseline="central">linea_fin = header(829) − 1 = X − 1</text>
  <text class="t-c-coral-ts" x="380" y="349" dominant-baseline="central">linea_fin &lt; linea_inicio. Bloque</text>
  <text class="t-c-coral-ts" x="380" y="367" dominant-baseline="central">vacío o negativo. Status: ok.</text>

  <line x1="180" y1="375" x2="180" y2="405" class="arr" marker-end="url(#arrow)"/>
  <line x1="500" y1="375" x2="500" y2="405" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="410" width="280" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t-c-teal-th" x="60" y="430" dominant-baseline="central">Cruzador para caso N+1:</text>
  <text class="t-c-teal-ts" x="60" y="448" dominant-baseline="central">linea_inicio = header(830)</text>
  <text class="t-c-teal-ts" x="60" y="466" dominant-baseline="central">linea_fin = header(835) − 1</text>
  <text class="t-c-teal-ts" x="60" y="484" dominant-baseline="central">Bloque limpio. Status: ok.</text>
  <text class="t-c-teal-ts" x="60" y="502" dominant-baseline="central">Sin solapamiento real.</text>

  <rect x="360" y="410" width="280" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="t-c-coral-th" x="380" y="430" dominant-baseline="central">Cruzador para caso N+1:</text>
  <text class="t-c-coral-ts" x="380" y="448" dominant-baseline="central">linea_inicio = header(829) = X</text>
  <text class="t-c-coral-ts" x="380" y="466" dominant-baseline="central">linea_fin = header(832) − 1</text>
  <text class="t-c-coral-ts" x="380" y="484" dominant-baseline="central">Bloque incluye TODA la pág. 829.</text>
  <text class="t-c-coral-ts" x="380" y="502" dominant-baseline="central">Hereda el cierre del caso N.</text>

  <rect x="40" y="535" width="600" height="105" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text class="t-amber-th" x="60" y="557" dominant-baseline="central">Síntesis: B045 produce DOS fallos distintos, no uno</text>
  <text class="t-amber-ts" x="60" y="577" dominant-baseline="central">A) El caso N desaparece silenciosamente del corpus parseado (bloque vacío o de líneas negativas).</text>
  <text class="t-amber-ts" x="60" y="595" dominant-baseline="central">B) El caso N+1 se procesa con arrastre del cierre de N (firma colegiada antes de su carátula real).</text>
  <text class="t-amber-ts" x="60" y="613" dominant-baseline="central">Ambos con status 'ok'. Cero guardas: el cruzador no compara linea_fin vs linea_inicio.</text>
  <text class="t-amber-ts" x="60" y="631" dominant-baseline="central">La política "asignar página al N+1" es emergente del cruzador, no decisión deliberada del catalogador.</text>
</svg>
